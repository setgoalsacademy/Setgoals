<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Goals Gaming Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F3EFE8;--brown:#4A1708;--caramel:#B5865A;--sand:#D1B08A;--gold:#C8A27A;--white:#fff;--radius:14px}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--brown);min-height:100vh}
.serif{font-family:'Cormorant Garamond',serif}
#nav{background:var(--brown);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#nav .logo{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;letter-spacing:1px}
#back-btn{color:var(--sand);font-size:.8rem;cursor:pointer;display:none;align-items:center;gap:6px}
#back-btn.show{display:flex}
.screen{display:none;animation:fadeIn .3s ease}.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.inp{width:100%;padding:14px 16px;border:1.5px solid var(--sand);border-radius:var(--radius);font-family:'Montserrat',sans-serif;font-size:1rem;background:var(--white);color:var(--brown);margin-bottom:24px;outline:none}
.inp:focus{border-color:var(--caramel)}
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:28px}
.av{font-size:2rem;padding:10px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.2s;text-align:center}
.av:hover,.av.sel{border-color:var(--caramel);background:#d1b08a22}
.btn{width:100%;padding:16px;background:var(--brown);color:var(--gold);border:none;border-radius:var(--radius);font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;cursor:pointer;transition:.2s}
.btn:hover{background:#6b2510}
#s-library{padding:20px;max-width:520px;margin:0 auto}
.lib-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding:16px;background:var(--brown);border-radius:var(--radius)}
.lib-av{font-size:2rem}.lib-info h2{font-size:1.2rem;color:var(--gold);font-family:'Cormorant Garamond',serif}.lib-info p{font-size:.75rem;color:var(--sand);margin-top:2px}
.apostila-card{background:var(--white);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:0 2px 12px rgba(74,23,8,.08)}
.apost-head{padding:16px 20px;display:flex;align-items:center;gap:12px}.apost-head.locked{opacity:.5}
.apost-icon{font-size:1.5rem}.apost-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--brown)}.apost-sub{font-size:.72rem;color:var(--caramel)}.apost-badge{margin-left:auto;background:var(--bg);border-radius:20px;padding:4px 10px;font-size:.7rem;color:var(--caramel)}
.games-list{padding:0 16px 16px}
.game-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.15s;border:1.5px solid transparent}
.game-item:hover:not(.locked){background:var(--bg);border-color:var(--sand)}.game-item.locked{opacity:.45;cursor:default}.game-item.done{background:var(--bg)}
.g-num{width:32px;height:32px;border-radius:50%;background:var(--brown);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.game-item.done .g-num{background:var(--caramel)}.game-item.locked .g-num{background:var(--sand)}
.g-info h4{font-size:.88rem;font-weight:600;color:var(--brown)}.g-info p{font-size:.72rem;color:var(--caramel)}.g-star{margin-left:auto;font-size:.85rem}
#s-game{max-width:520px;margin:0 auto}
.game-top{background:var(--brown);padding:16px 20px}
.game-top h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold)}.game-top p{font-size:.72rem;color:var(--sand);margin-top:2px}
.prog-bar{height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--caramel));border-radius:3px;transition:width .4s}
.hud{display:flex;gap:16px;margin-top:10px;font-size:.72rem;color:var(--sand)}
.scene-box{background:var(--caramel);padding:14px 20px}
.scene-label{font-size:.68rem;color:rgba(255,255,255,.75);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.scene-text{color:var(--white);font-size:.88rem;line-height:1.5}
.q-box{padding:20px}
.q-text{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--brown);line-height:1.4;margin-bottom:14px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{padding:13px 16px;border:1.5px solid var(--sand);border-radius:var(--radius);background:var(--white);color:var(--brown);font-family:'Montserrat',sans-serif;font-size:.88rem;cursor:pointer;text-align:left;transition:.2s;line-height:1.4}
.opt:hover:not(:disabled){border-color:var(--caramel);background:var(--bg)}.opt.correct{border-color:#4caf50;background:#e8f5e9;color:#2e7d32}.opt.wrong{border-color:#e57373;background:#ffebee;color:#c62828}
.sentence-build{min-height:48px;border:2px dashed var(--sand);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--white)}
.ph{font-size:.8rem;color:var(--sand);font-style:italic}
.blocks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.block{padding:9px 14px;border-radius:8px;border:1.5px solid var(--sand);background:var(--white);color:var(--brown);font-size:.85rem;cursor:pointer;transition:.2s;font-family:'Montserrat',sans-serif}
.block:hover{border-color:var(--caramel);background:var(--bg)}.block.used{opacity:.3;pointer-events:none}
.built-word{padding:8px 14px;border-radius:8px;background:var(--caramel);color:var(--white);font-size:.85rem;cursor:pointer;font-family:'Montserrat',sans-serif}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:10px 12px;border-radius:10px;border:1.5px solid var(--sand);background:var(--white);color:var(--brown);font-size:.82rem;cursor:pointer;text-align:center;transition:.2s;font-family:'Montserrat',sans-serif}
.match-item.active{border-color:var(--caramel);background:#b5865a18}.match-item.matched-ok{border-color:#4caf50;background:#e8f5e9;color:#2e7d32;pointer-events:none}.match-item.matched-err{border-color:#e57373;background:#ffebee}
.fill-sentence{font-family:'Cormorant Garamond',serif;font-size:1.15rem;line-height:2.2;color:var(--brown);margin-bottom:12px}
.blank-inp{border:none;border-bottom:2px solid var(--caramel);background:transparent;font-family:'Montserrat',sans-serif;font-size:.95rem;color:var(--brown);outline:none;min-width:80px;padding:2px 6px;text-align:center}
.blank-inp.ok{border-color:#4caf50;color:#2e7d32}.blank-inp.err{border-color:#e57373;color:#c62828}
.dialogue-box{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.d-line{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:12px;background:var(--white);border:1px solid var(--sand)}
.d-speaker{font-size:.7rem;font-weight:700;color:var(--caramel);min-width:44px;padding-top:3px}
.d-text{font-size:.88rem;line-height:1.7;color:var(--brown);flex:1}
.order-pool{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.order-item{padding:12px 14px;border-radius:10px;border:1.5px solid var(--sand);background:var(--white);font-size:.83rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px}
.order-item:hover:not(.placed){border-color:var(--caramel);background:var(--bg)}.order-item.placed{opacity:.3;pointer-events:none}
.order-zone{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.order-slot{padding:12px 14px;border-radius:10px;border:2px dashed var(--sand);background:var(--white);font-size:.83rem;color:var(--sand);font-style:italic;cursor:pointer;min-height:44px;display:flex;align-items:center}
.order-slot.filled{border-color:var(--caramel);background:#b5865a10;color:var(--brown);font-style:normal}.order-slot.correct-slot{border-color:#4caf50;background:#e8f5e9;color:#2e7d32}.order-slot.wrong-slot{border-color:#e57373;background:#ffebee;color:#c62828}
.listen-card{background:var(--brown);border-radius:var(--radius);padding:20px;margin-bottom:14px;text-align:center}
.listen-btn{background:var(--gold);border:none;border-radius:50%;width:64px;height:64px;font-size:1.8rem;cursor:pointer;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;transition:.2s}
.listen-btn:hover{background:var(--caramel)}.listen-hint{color:var(--sand);font-size:.78rem}
.listen-text{color:rgba(255,255,255,.15);font-size:.82rem;margin-top:10px;font-style:italic;cursor:pointer;user-select:none;transition:color .3s;line-height:1.5}
.listen-text.reveal{color:rgba(255,255,255,.85)}
.tf-options{display:flex;gap:12px;margin-bottom:12px}
.tf-btn{flex:1;padding:16px;border-radius:var(--radius);border:2px solid var(--sand);background:var(--white);font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;cursor:pointer;transition:.2s}
.tf-btn:hover:not(:disabled){border-color:var(--caramel);background:var(--bg)}.tf-btn.correct{border-color:#4caf50;background:#e8f5e9;color:#2e7d32}.tf-btn.wrong{border-color:#e57373;background:#ffebee;color:#c62828}
.ws-grid{display:grid;gap:3px;margin-bottom:14px;user-select:none}
.ws-cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;background:var(--white);border:1px solid var(--sand);transition:.15s;font-family:'Montserrat',sans-serif;color:var(--brown)}
.ws-cell.selecting{background:#d1b08a55;border-color:var(--caramel)}.ws-cell.found{background:var(--caramel);color:var(--white);border-color:var(--caramel)}
.ws-words{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.ws-word{padding:6px 12px;border-radius:8px;border:1.5px solid var(--sand);font-size:.8rem;background:var(--white);color:var(--brown)}.ws-word.found-word{background:var(--caramel);color:var(--white);border-color:var(--caramel);text-decoration:line-through}
.feedback{margin-top:12px;padding:12px 14px;border-radius:var(--radius);font-size:.82rem;line-height:1.5;display:none}
.feedback.show{display:block}.feedback.ok{background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32}.feedback.err{background:#ffebee;border:1px solid #ef9a9a;color:#c62828}
.next-btn{width:100%;margin-top:12px;padding:14px;background:var(--brown);color:var(--gold);border:none;border-radius:var(--radius);font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;cursor:pointer;display:none}
.next-btn.show{display:block}
.check-btn{width:100%;margin-top:12px;padding:14px;background:var(--caramel);color:var(--white);border:none;border-radius:var(--radius);font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;cursor:pointer}
.result-box{padding:30px 20px;text-align:center;max-width:520px;margin:0 auto}
.score-circle{width:110px;height:110px;border-radius:50%;border:4px solid var(--caramel);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;background:var(--white)}
.score-circle .pts{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--brown);line-height:1}
.mistake-item{background:var(--white);border-radius:10px;padding:12px;margin-bottom:8px;font-size:.8rem;border-left:3px solid var(--caramel);text-align:left}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--brown);display:flex;border-top:1px solid #c8a27a30}
.bnav-item{flex:1;padding:12px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--sand);font-size:.62rem}
.bnav-item.active{color:var(--gold)}.bnav-icon{font-size:1.25rem}
#page-content{padding-bottom:70px}
.prof-hero{background:var(--brown);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:20px}
.prof-hero .pav{font-size:3.5rem;margin-bottom:8px}.prof-hero h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold)}.prof-hero p{font-size:.75rem;color:var(--sand);margin-top:4px}
.stats-row{display:flex;gap:12px;margin-bottom:20px}
.stat-card{flex:1;background:var(--white);border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(74,23,8,.07)}
.stat-card .sv{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--brown)}.stat-card .sl{font-size:.65rem;color:var(--caramel)}
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.badge-card{background:var(--white);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(74,23,8,.07)}.badge-card.locked{opacity:.4}
.badge-card .bi{font-size:1.8rem;margin-bottom:4px}.badge-card .bn{font-size:.65rem;font-weight:600;color:var(--brown)}
.motiv{background:var(--brown);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:20px}
.motiv p{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold);font-style:italic}
</style>
</head>
<body>
<div id="nav"><div class="logo">✦ Set Goals</div><div id="back-btn" onclick="goBack()">← Back</div></div>
<div id="page-content">
<div id="s-welcome" class="screen active">
  <div style="padding:40px 20px;max-width:480px;margin:0 auto;text-align:center">
    <h1 class="serif" style="font-size:2.2rem;margin-bottom:8px">Welcome!</h1>
    <p style="color:var(--caramel);margin-bottom:32px;font-size:.9rem">Let's create your profile.</p>
    <input id="name-inp" class="inp" type="text" placeholder="Your name" maxlength="30">
    <div style="text-align:left;font-size:.8rem;color:var(--caramel);margin-bottom:12px;font-weight:500">Choose your avatar</div>
    <div class="avatar-grid" id="av-grid">
    <div class="av" onclick="selectAvatar(this,`🌸`)">🌸</div>
    <div class="av" onclick="selectAvatar(this,`🌺`)">🌺</div>
    <div class="av" onclick="selectAvatar(this,`🦋`)">🦋</div>
    <div class="av" onclick="selectAvatar(this,`⭐`)">⭐</div>
    <div class="av" onclick="selectAvatar(this,`🌙`)">🌙</div>
    <div class="av" onclick="selectAvatar(this,`🌿`)">🌿</div>
    <div class="av" onclick="selectAvatar(this,`💎`)">💎</div>
    <div class="av" onclick="selectAvatar(this,`🦄`)">🦄</div>
    <div class="av" onclick="selectAvatar(this,`🌊`)">🌊</div>
    <div class="av" onclick="selectAvatar(this,`🎯`)">🎯</div>
  </div>
    <button class="btn" onclick="saveProfile()">Start my journey ✦</button>
  </div>
</div>
<div id="s-library" class="screen">
  <div style="padding:20px;max-width:520px;margin:0 auto">
    <div class="lib-header"><div class="lib-av" id="lib-av">🌟</div><div class="lib-info"><h2 id="lib-name">Student</h2><p id="lib-sub">Begin your journey</p></div></div>
    <div id="apostilas-container"></div>
  </div>
</div>
<div id="s-game" class="screen">
  <div class="game-top"><h3 id="g-title"></h3><p id="g-sub"></p>
    <div class="prog-bar"><div class="prog-fill" id="g-prog" style="width:0%"></div></div>
    <div class="hud"><span>⭐ <span id="g-pts">0</span></span><span>❤️ <span id="g-lives">3</span></span><span>📍 <span id="g-step">1</span>/<span id="g-total">9</span></span></div>
  </div>
  <div class="scene-box"><div class="scene-label" id="g-scene-label"></div><div class="scene-text" id="g-scene-text"></div></div>
  <div class="q-box"><div class="q-text" id="g-question"></div><div id="g-mechanic"></div><div class="feedback" id="g-feedback"></div><button class="next-btn" id="g-next" onclick="nextStep()">Continue →</button></div>
</div>
<div id="s-result" class="screen">
  <div class="result-box">
    <h2 class="serif" style="font-size:2rem;margin-bottom:8px">Well done! ✦</h2>
    <p id="r-sub" style="color:var(--caramel);margin-bottom:24px;font-size:.9rem"></p>
    <div class="score-circle"><div class="pts" id="r-pts">0</div><small style="font-size:.65rem;color:var(--caramel)">points</small></div>
    <div id="r-mistakes" style="margin-bottom:24px"></div>
    <button class="btn" onclick="goLib()">Back to Library</button>
  </div>
</div>
<div id="s-profile" class="screen">
  <div style="padding:20px;max-width:520px;margin:0 auto">
    <div class="prof-hero"><div class="pav" id="p-av">🌟</div><h2 id="p-name">Student</h2><p>Set Goals Academy</p></div>
    <div class="stats-row">
      <div class="stat-card"><div class="sv" id="p-pts">0</div><div class="sl">Points</div></div>
      <div class="stat-card"><div class="sv" id="p-done">0</div><div class="sl">Games Done</div></div>
      <div class="stat-card"><div class="sv" id="p-streak">0</div><div class="sl">Day Streak 🔥</div></div>
    </div>
    <div class="motiv"><p id="p-motiv">"Every word is a step forward."</p></div>
    <div class="serif" style="font-size:1.15rem;margin-bottom:12px">Your Badges</div>
    <div class="badges-grid" id="p-badges"></div>
  </div>
</div>
</div>
<div id="bottom-nav" style="display:none">
  <div class="bnav-item active" id="bn-lib" onclick="showLib()"><div class="bnav-icon">📚</div>Library</div>
  <div class="bnav-item" id="bn-prof" onclick="showProf()"><div class="bnav-icon">👤</div>Profile</div>
</div>
<script>
const AVATARS=['🌸','🌺','🦋','⭐','🌙','🌿','💎','🦄','🌊','🎯'];
const BADGES=[
  {id:'first',icon:'🌟',name:'First Step'},{id:'streak3',icon:'🔥',name:'3 Days'},
  {id:'half',icon:'🎯',name:'10 Games'},{id:'pts500',icon:'💰',name:'500 Points'},
  {id:'perfect',icon:'💎',name:'Perfect Game'},{id:'au0done',icon:'🇦🇺',name:'Australia 0'},
  {id:'au1done',icon:'🌏',name:'Australia I'},{id:'au2done',icon:'🦘',name:'Australia II'},
  {id:'au3done',icon:'🌄',name:'Australia III'},{id:'bah1done',icon:'🌊',name:'Bahamas I'},
  {id:'bah2done',icon:'🐠',name:'Bahamas II'},{id:'engdone',icon:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',name:'England'},
  {id:'iredone',icon:'☘️',name:'Ireland'},
  {id:'jamdone',icon:'🇯🇲',name:'Jamaica'},{id:'nz1done',icon:'🇳🇿',name:'New Zealand I'},{id:'nz2done',icon:'🥝',name:'New Zealand II'},{id:'nz3done',icon:'🇳🇿',name:'New Zealand III'},{id:'nz4done',icon:'🥝',name:'New Zealand IV'},{id:'sc1done',icon:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',name:'Scotland I'},{id:'sc3done',icon:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',name:'Scotland III'},{id:'sa1done',icon:'🇿🇦',name:'South Africa I'},{id:'sa2done',icon:'🇿🇦',name:'South Africa II'},{id:'sa3done',icon:'🇿🇦',name:'South Africa III'},
];
const MOTIVS=['"Every word is a step forward."','"Progress, not perfection."','"You are doing amazing!"','"Consistency is your superpower."','"Each lesson opens a new door."','"Fluency is built one sentence at a time."','"You\'ve got this — keep going!"','"Excellence is a habit, not a gift."','"Language is the road map of a culture."'];
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
const norm=s=>s.replace(/[!?.,]/g,'').toLowerCase().trim().replace(/\s+/g,' ');
function flexMatch(a,b){if(norm(a)===norm(b))return true;return false;}
function speak(txt){
  if(!window.speechSynthesis)return;window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);u.lang='en-US';u.rate=0.85;
  const vs=window.speechSynthesis.getVoices();const v=vs.find(x=>x.lang.startsWith('en')&&x.name.includes('Female'))||vs.find(x=>x.lang.startsWith('en'))||null;
  if(v)u.voice=v;window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════════════
// GAME DATA — previous apostilas condensed + IRELAND full
// ════════════════════════════════════════════════════════
const GAMES={
// ── Previous apostilas (ultra-condensed representative samples) ─────────
'au0-g1':{title:'Hello, Sydney!',sub:'Greetings',scenes:[

function renderLib(){
  document.getElementById('lib-av').textContent=profile.avatar||'🌟';
  document.getElementById('lib-name').textContent=profile.name||'Student';
  const done=profile.gamesDone||0;
  document.getElementById('lib-sub').textContent=(profile.points||0)+' pts · '+done+' games done';
  const cont=document.getElementById('apostilas-container');
  cont.innerHTML='';
  let prevUnlocked=true;
  APOSTILAS.forEach(ap=>{
    const apDone=(profile.completed&&profile.completed[ap.id])||[];
    const allDone=apDone.length>=(ap.games||[]).length&&ap.games.length>0;
    const locked=!prevUnlocked;
    if(allDone)prevUnlocked=true;
    else prevUnlocked=!locked;
    const card=document.createElement('div');
    card.className='apostila-card';
    const head=document.createElement('div');
    head.className='apost-head'+(locked?' locked':'');
    head.innerHTML='<div class="apost-icon">'+ap.icon+'</div>'
      +'<div><div class="apost-title">'+ap.title+'</div>'
      +'<div class="apost-sub">'+ap.sub+'</div></div>'
      +'<div class="apost-badge">'+apDone.length+'/'+ap.games.length+' done</div>';
    card.appendChild(head);
    const list=document.createElement('div');
    list.className='games-list';
    (ap.games||[]).forEach((gid,i)=>{
      const gData=GAMES[gid];
      if(!gData)return;
      const isDone=apDone.includes(gid);
      const isLocked=locked||(i>0&&!apDone.includes(ap.games[i-1])&&!isDone);
      const icon=isDone?'⭐':(isLocked?'🔒':'▶');
      const item=document.createElement('div');
      item.className='game-item'+(isDone?' done':'')+(isLocked?' locked':'');
      item.innerHTML='<div class="g-num">'+(i+1)+'</div>'
        +'<div class="g-info"><h4>'+gData.title+'</h4><p>'+gData.sub+'</p></div>'
        +'<div class="g-star">'+icon+'</div>';
      if(!isLocked)item.onclick=()=>startGame(gid);
      list.appendChild(item);
    });
    card.appendChild(list);
    cont.appendChild(card);
  });
}

// GAME ENGINE
// ═══════════════════════════════════════════════════════════════════════
function startGame(gid){
  curGame=GAMES[gid];curGame._id=gid;
  curStep=0;pts=0;lives=3;mistakes=[];
  document.getElementById('g-title').textContent=curGame.title;
  document.getElementById('g-sub').textContent=curGame.sub;
  show('s-game');
  renderStep();
}
function renderStep(){
  const sc=curGame.scenes[curStep];
  const total=curGame.scenes.length;
  document.getElementById('g-prog').style.width=((curStep/total)*100)+'%';
  document.getElementById('g-pts').textContent=pts;
  document.getElementById('g-lives').textContent='❤️'.repeat(lives);
  document.getElementById('g-step').textContent=curStep+1;
  document.getElementById('g-total').textContent=total;
  document.getElementById('g-scene-label').textContent=sc.label||'';
  document.getElementById('g-scene-text').textContent=sc.text||'';
  document.getElementById('g-question').textContent=sc.q||'';
  document.getElementById('g-feedback').className='feedback';
  document.getElementById('g-feedback').textContent='';
  document.getElementById('g-next').className='next-btn';
  const m=document.getElementById('g-mechanic');
  m.innerHTML='';
  if(sc.type==='mcq')renderMCQ(sc,m);
  else if(sc.type==='fill')renderFill(sc,m);
  else if(sc.type==='blocks')renderBlocks(sc,m);
  else if(sc.type==='match')renderMatch(sc,m);
  else if(sc.type==='listen')renderListen(sc,m);
  else if(sc.type==='dialogfill')renderDialogFill(sc,m);
  else if(sc.type==='order')renderOrder(sc,m);
  else if(sc.type==='tf')renderTF(sc,m);
  else if(sc.type==='wordsearch')renderWS(sc,m);
}
function showFb(ok,text){
  const fb=document.getElementById('g-feedback');
  fb.textContent=text;fb.className='feedback show '+(ok?'ok':'err');
  document.getElementById('g-next').className='next-btn show';
}
function nextStep(){
  curStep++;
  if(curStep>=curGame.scenes.length){showResult();}
  else{renderStep();}
}
function showResult(){
  const gid=curGame._id;
  if(!profile.completed)profile.completed={};
  const apId=gid.split('-g')[0];
  if(!profile.completed[apId])profile.completed[apId]=[];
  if(!profile.completed[apId].includes(gid))profile.completed[apId].push(gid);
  profile.points=(profile.points||0)+pts;
  profile.gamesDone=(profile.gamesDone||0)+1;
  // Badges
  if(!profile.badges)profile.badges=[];
  if(!profile.badges.includes('first'))profile.badges.push('first');
  if(profile.gamesDone>=10&&!profile.badges.includes('half'))profile.badges.push('half');
  if(profile.points>=500&&!profile.badges.includes('pts500'))profile.badges.push('pts500');
  if(mistakes.length===0&&!profile.badges.includes('perfect'))profile.badges.push('perfect');
  // Check apostila completion
  APOSTILAS.forEach(ap=>{
    const apDone=profile.completed[ap.id]||[];
    if(apDone.length>=ap.games.length&&!profile.badges.includes(ap.badgeId)){
      profile.badges.push(ap.badgeId);
    }
  });
  saveP();
  document.getElementById('r-pts').textContent=pts;
  document.getElementById('r-sub').textContent=`You completed "${curGame.title}"!`;
  let mh='';
  if(mistakes.length>0){
    mh='<div style="text-align:left;margin-bottom:8px;font-size:.85rem;font-weight:600">Review:</div>';
    mistakes.forEach(k=>{mh+=`<div class="mistake-item">${k}</div>`;});
  }
  document.getElementById('r-mistakes').innerHTML=mh;
  show('s-result');
}

// MECHANICS
// ═══════════════════════════════════════════════════════════════════════
function renderMCQ(sc,m){
  sc.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';b.textContent=o;
    b.onclick=()=>{
      document.querySelectorAll('.opt').forEach(x=>{x.disabled=true;});
      if(i===sc.ans){b.classList.add('correct');pts+=10;showFb(true,sc.fb);}
      else{b.classList.add('wrong');document.querySelectorAll('.opt')[sc.ans].classList.add('correct');lives--;mistakes.push(sc.q+' → '+sc.opts[sc.ans]);if(lives<=0)lives=0;showFb(false,'✗ '+sc.opts[sc.ans]);}
    };
    m.appendChild(b);
  });
}
function renderFill(sc,m){
  let html='<div class="fill-sentence">';
  sc.blanks.forEach((bl,i)=>{
    html+=`<input class="blank-inp" id="bl${i}" placeholder="${bl.ph}" style="width:${Math.max(bl.ph.length*12,80)}px">`;
    if(i<sc.blanks.length-1)html+=' ';
  });
  html+='</div>';
  m.innerHTML=html;
  const btn=document.createElement('button');
  btn.className='check-btn';btn.textContent='Check ✓';
  btn.onclick=()=>{
    let allOk=true;
    sc.blanks.forEach((bl,i)=>{
      const inp=document.getElementById('bl'+i);
      const ok=bl.answers.some(a=>norm(inp.value)===norm(a));
      inp.className='blank-inp '+(ok?'ok':'err');
      if(!ok){allOk=false;mistakes.push(inp.placeholder+' → '+bl.answers[0]);}
    });
    if(allOk){pts+=10;showFb(true,sc.fb);}
    else{lives--;if(lives<=0)lives=0;showFb(false,sc.fb);}
    btn.disabled=true;
  };
  m.appendChild(btn);
}
function renderBlocks(sc,m){
  const built=[];
  const pool=document.createElement('div');pool.className='blocks';
  const zone=document.createElement('div');zone.className='sentence-build';
  zone.innerHTML='<span class="ph">Tap words to build the sentence</span>';
  const words=shuffle([...sc.words]);
  words.forEach(w=>{
    const b=document.createElement('div');b.className='block';b.textContent=w;
    b.onclick=()=>{
      if(b.classList.contains('used'))return;
      b.classList.add('used');built.push(w);
      const bw=document.createElement('span');bw.className='built-word';bw.textContent=w;
      bw.onclick=()=>{
        built.splice(built.lastIndexOf(w),1);
        bw.remove();b.classList.remove('used');
        if(zone.children.length===0)zone.innerHTML='<span class="ph">Tap words to build the sentence</span>';
      };
      if(zone.querySelector('.ph'))zone.innerHTML='';
      zone.appendChild(bw);
    };
    pool.appendChild(b);
  });
  m.appendChild(zone);m.appendChild(pool);
  const btn=document.createElement('button');btn.className='check-btn';btn.textContent='Check ✓';
  btn.onclick=()=>{
    const ans=built.join(' ');
    const ok=sc.flex?built.map(w=>norm(w)).sort().join(' ')===sc.answer.split(' ').map(w=>norm(w)).sort().join(' ')
      :norm(ans)===norm(sc.answer);
    if(ok){pts+=10;showFb(true,sc.fb);}
    else{lives--;if(lives<=0)lives=0;mistakes.push(ans+' → '+sc.answer);showFb(false,'Correct: '+sc.answer);}
    btn.disabled=true;
  };
  m.appendChild(btn);
}
function renderMatch(sc,m){
  const pairs=shuffle([...sc.pairs]);
  const left=pairs.map(p=>p[0]);
  const right=shuffle(pairs.map(p=>p[1]));
  let selL=null,matched=new Set();
  const grid=document.createElement('div');grid.className='match-grid';
  const colL=document.createElement('div');colL.className='match-col';
  const colR=document.createElement('div');colR.className='match-col';
  const makeItem=(txt,side,idx)=>{
    const d=document.createElement('div');d.className='match-item';d.textContent=txt;
    d.onclick=()=>{
      if(matched.has(txt))return;
      if(side==='L'){
        document.querySelectorAll('.match-item').forEach(x=>x.classList.remove('active'));
        d.classList.add('active');selL=idx;
      } else if(selL!==null){
        const lTxt=left[selL];const rTxt=right[idx];
        const correct=pairs.some(p=>p[0]===lTxt&&p[1]===rTxt);
        if(correct){
          matched.add(lTxt);matched.add(rTxt);
          document.querySelectorAll('.match-item').forEach(x=>{if(x.textContent===lTxt||x.textContent===rTxt){x.className='match-item matched-ok';}});
          pts+=3;
          if(matched.size===pairs.length*2){showFb(true,sc.fb);}
        } else {
          d.classList.add('matched-err');setTimeout(()=>d.classList.remove('matched-err'),600);
          lives--;if(lives<=0)lives=0;mistakes.push(lTxt+' ≠ '+rTxt);
          document.querySelectorAll('.match-item').forEach(x=>x.classList.remove('active'));
        }
        selL=null;
      }
    };
    return d;
  };
  left.forEach((t,i)=>colL.appendChild(makeItem(t,'L',i)));
  right.forEach((t,i)=>colR.appendChild(makeItem(t,'R',i)));
  grid.appendChild(colL);grid.appendChild(colR);m.appendChild(grid);
}
function renderListen(sc,m){
  const card=document.createElement('div');card.className='listen-card';
  card.innerHTML=`<button class="listen-btn" onclick="speak('${sc.text2speak.replace(/'/g,"\\'")}')">🔊</button><div class="listen-hint">Tap to listen</div><div class="listen-text" id="ltxt" onclick="this.classList.toggle('reveal')">${sc.text2speak}</div>`;
  m.appendChild(card);

    const b=document.createElement('button');b.className='opt';b.textContent=o;

      document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
      if(i===sc.ans){b.classList.add('correct');pts+=10;showFb(true,sc.fb);}

    };
    m.appendChild(b);
  });
}
function renderDialogFill(sc,m){
  const box=document.createElement('div');box.className='dialogue-box';
  const inputs=[];
  sc.lines.forEach(ln=>{
    const d=document.createElement('div');d.className='d-line';
    d.innerHTML=`<div class="d-speaker">${ln.speaker}</div><div class="d-text" id="dtext_${ln.speaker}"></div>`;
    let txt=ln.text;
    const blInputs=[];
    ln.blanks.forEach((bl,bi)=>{
      const ph=`___`;
      txt=txt.replace(ph,`<input class="blank-inp" id="dbl_${ln.speaker}_${bi}" placeholder="${bl.ph}" style="width:${Math.max(bl.ph.length*11,60)}px">`);
      blInputs.push({bl,id:`dbl_${ln.speaker}_${bi}`});
    });
    box.appendChild(d);
    setTimeout(()=>{const el=document.getElementById(`dtext_${ln.speaker}`);if(el)el.innerHTML=txt;},0);
    inputs.push(...blInputs);
  });
  m.appendChild(box);
  const btn=document.createElement('button');btn.className='check-btn';btn.textContent='Check ✓';
  btn.onclick=()=>{
    let allOk=true;
    inputs.forEach(({bl,id})=>{
      const inp=document.getElementById(id);if(!inp)return;
      const ok=bl.answers.some(a=>norm(inp.value)===norm(a));
      inp.className='blank-inp '+(ok?'ok':'err');
      if(!ok){allOk=false;mistakes.push(inp.placeholder+' → '+bl.answers[0]);}
    });
    if(allOk){pts+=10;showFb(true,sc.fb);}
    else{lives--;if(lives<=0)lives=0;showFb(false,sc.fb);}
    btn.disabled=true;
  };
  m.appendChild(btn);
}
function renderOrder(sc,m){
  const items=shuffle([...sc.lines]);
  const placed=[];
  const pool=document.createElement('div');pool.className='order-pool';
  const zone=document.createElement('div');zone.className='order-zone';
  sc.lines.forEach((_,i)=>{
    const slot=document.createElement('div');slot.className='order-slot';slot.textContent=`${i+1}. Click to place`;slot.dataset.idx=i;
    slot.onclick=()=>{
      if(placed[i]){
        const removedItem=placed[i];placed[i]=null;
        slot.className='order-slot';slot.textContent=`${i+1}. Click to place`;
        const origBtn=document.querySelector(`.order-item[data-text="${CSS.escape(removedItem)}"]`);
        if(origBtn)origBtn.classList.remove('placed');
      }
    };
    zone.appendChild(slot);placed.push(null);
  });
  items.forEach((txt)=>{
    const b=document.createElement('div');b.className='order-item';b.textContent=txt;b.dataset.text=txt;
    b.onclick=()=>{
      if(b.classList.contains('placed'))return;
      const emptyIdx=placed.findIndex(x=>x===null);
      if(emptyIdx===-1)return;
      placed[emptyIdx]=txt;b.classList.add('placed');
      const slot=zone.children[emptyIdx];
      slot.textContent=`${emptyIdx+1}. ${txt}`;slot.classList.add('filled');
    };
    pool.appendChild(b);
  });
  m.appendChild(zone);m.appendChild(pool);
  const btn=document.createElement('button');btn.className='check-btn';btn.textContent='Check ✓';
  btn.onclick=()=>{
    let allOk=true;
    sc.lines.forEach((correct,i)=>{
      const slot=zone.children[i];
      if(placed[i]===correct){slot.classList.add('correct-slot');}
      else{slot.classList.add('wrong-slot');allOk=false;mistakes.push(`Pos ${i+1}: ${placed[i]||'empty'} → ${correct}`);}
    });
    if(allOk){pts+=10;showFb(true,sc.fb);}
    else{lives--;if(lives<=0)lives=0;showFb(false,sc.fb);}
    btn.disabled=true;
  };
  m.appendChild(btn);
}
function renderTF(sc,m){
  const stmt=document.createElement('div');stmt.style.cssText='padding:12px;background:var(--bg);border-radius:var(--radius);margin-bottom:12px;font-size:.9rem;font-style:italic;';stmt.textContent=sc.statement;m.appendChild(stmt);
  const row=document.createElement('div');row.className='tf-options';
  ['True','False'].forEach((lbl,i)=>{
    const b=document.createElement('button');b.className='tf-btn';b.textContent=lbl;
    b.onclick=()=>{
      document.querySelectorAll('.tf-btn').forEach(x=>x.disabled=true);
      const chosen=(i===0);
      if(chosen===sc.correct){b.classList.add('correct');pts+=10;showFb(true,sc.fb);}
      else{b.classList.add('wrong');document.querySelectorAll('.tf-btn')[sc.correct?0:1].classList.add('correct');lives--;if(lives<=0)lives=0;mistakes.push(sc.statement+' → '+(sc.correct?'True':'False'));showFb(false,sc.fb);}
    };
    row.appendChild(b);
  });
  m.appendChild(row);
}
function renderWS(sc,m){
  const sz=sc.gridSize||8;
  const grid=document.createElement('div');grid.className='ws-grid';
  grid.style.gridTemplateColumns=`repeat(${sz},36px)`;
  const cells=[];
  sc.grid.forEach((row,r)=>{
    [...row].forEach((ch,c)=>{
      const d=document.createElement('div');d.className='ws-cell';d.textContent=ch;d.dataset.r=r;d.dataset.c=c;
      d.onmousedown=d.ontouchstart=()=>{wsSelecting=true;wsStart={r,c};wsPath=[{r,c}];d.classList.add('selecting');};
      d.onmouseenter=d.ontouchmove=()=>{if(!wsSelecting)return;d.classList.add('selecting');wsPath.push({r,c});};
      d.onmouseup=d.ontouchend=()=>{if(!wsSelecting)return;wsSelecting=false;checkWS(wsPath,cells,sc,grid,wordsEl);wsPath=[];document.querySelectorAll('.ws-cell.selecting').forEach(x=>x.classList.remove('selecting'));};
      grid.appendChild(d);cells.push(d);
    });
  });
  const wordsEl=document.createElement('div');wordsEl.className='ws-words';
  sc.words.forEach(w=>{
    const s=document.createElement('span');s.className='ws-word';s.textContent=w;s.id='wsw_'+w;wordsEl.appendChild(s);
  });
  m.appendChild(wordsEl);m.appendChild(grid);
}
function checkWS(path,cells,sc,grid,wordsEl){
  const word=path.map(p=>{
    const r=parseInt(p.r),c=parseInt(p.c);
    const sz=sc.gridSize||8;
    return sc.grid[r]?.[c]||'';
  }).join('');
  const rev=word.split('').reverse().join('');
  const found=sc.words.find(w=>w===word||w===rev);
  if(found){
    path.forEach(p=>{
      const r=parseInt(p.r),c=parseInt(p.c);const sz=sc.gridSize||8;
      const idx=r*sz+c;
      if(cells[idx])cells[idx].className='ws-cell found';
    });
    const ws=document.getElementById('wsw_'+found);if(ws)ws.className='ws-word found-word';
    pts+=5;
    const allFound=sc.words.every(w=>document.getElementById('wsw_'+w)?.classList.contains('found-word'));
    if(allFound)showFb(true,sc.fb);
  }
}
// Initialise after all functions defined
(function(){
  loadP();
  buildAvatars();
  if(profile.name){showLib();}
})();
